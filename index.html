<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JICrew Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mencegah scroll mental di iOS */
        body { -webkit-tap-highlight-color: transparent; background-color: #f3f4f6; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: white; min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.1); position: relative; }
        .loader { border-top-color: #3498db; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800">

<div class="app-container" id="app">
    
    <!-- LOADING OVERLAY -->
    <div id="loading" class="hidden absolute inset-0 bg-white bg-opacity-90 z-50 flex flex-col justify-center items-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-gray-600 font-semibold text-sm">Memproses...</p>
    </div>

    <!-- VIEW: LOGIN -->
    <div id="view-login" class="view-section p-6 flex flex-col justify-center min-h-screen">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600">JICrew</h1>
            <p class="text-sm text-gray-500 mt-1">Portal Manajemen Handling Saudi</p>
        </div>
        <form id="form-login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Email</label>
                <input type="email" id="log-email" class="w-full mt-1 p-3 border rounded-lg focus:ring focus:ring-blue-200" required>
            </div>
            <div>
                <label class="block text-sm font-medium">Password</label>
                <input type="password" id="log-pass" class="w-full mt-1 p-3 border rounded-lg focus:ring focus:ring-blue-200" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg shadow-md mt-4">Masuk</button>
        </form>
        <p class="text-center mt-6 text-sm">Belum punya akun? <a href="#" onclick="app.navigate('register')" class="text-blue-600 font-bold">Daftar</a></p>
    </div>

    <!-- VIEW: REGISTER -->
    <div id="view-register" class="view-section hidden p-6 flex flex-col justify-center min-h-screen">
        <h2 class="text-2xl font-bold text-blue-600 mb-6">Daftar Akun</h2>
        <form id="form-register" class="space-y-4">
            <div><label class="block text-sm font-medium">Nama Lengkap</label><input type="text" id="reg-nama" class="w-full mt-1 p-3 border rounded-lg" required></div>
            <div><label class="block text-sm font-medium">Email</label><input type="email" id="reg-email" class="w-full mt-1 p-3 border rounded-lg" required></div>
            <div><label class="block text-sm font-medium">Password</label><input type="password" id="reg-pass" class="w-full mt-1 p-3 border rounded-lg" required></div>
            <button type="submit" class="w-full bg-green-600 text-white font-bold p-3 rounded-lg shadow-md">Kirim Pendaftaran</button>
        </form>
        <button onclick="app.navigate('login')" class="w-full mt-4 text-gray-500 font-semibold">Batal</button>
    </div>

    <!-- VIEW: PORTAL FREELANCER -->
    <div id="view-freelancer" class="view-section hidden h-screen flex flex-col">
        <div class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
            <div>
                <h2 class="font-bold">Dashboard Crew</h2>
                <p class="text-xs text-blue-100" id="user-name">Nama User</p>
            </div>
            <div class="text-right">
                <span class="text-xs text-blue-100">Total Poin</span><br>
                <span class="font-bold text-lg" id="user-poin">0</span>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 bg-gray-50 pb-20">
            <!-- SOP Accordion (Contoh) -->
            <details class="bg-white p-3 rounded-lg shadow-sm mb-4">
                <summary class="font-semibold text-gray-700 cursor-pointer">SOP Tugas Handling</summary>
                <div class="text-sm text-gray-600 mt-2 space-y-1">
                    <p>1. Datang 30 menit sebelum jadwal.</p>
                    <p>2. Gunakan seragam lengkap JICrew.</p>
                    <p>3. Input absensi saat tiba di lokasi.</p>
                </div>
            </details>

            <!-- Jadwal Tersedia -->
            <h3 class="font-bold text-gray-800 mb-2">Jadwal Tersedia</h3>
            <div id="list-jadwal" class="space-y-3">
                <!-- Data di-render lewat JS -->
            </div>
        </div>

        <!-- Bottom Nav Bar Mobile -->
        <div class="absolute bottom-0 w-full bg-white border-t flex justify-around p-3 text-xs text-gray-500">
            <button class="flex flex-col items-center text-blue-600"><span class="font-bold text-xl">🏠</span>Home</button>
            <button class="flex flex-col items-center" onclick="alert('Fitur Laporan dalam pengembangan')"><span class="font-bold text-xl">📝</span>Laporan</button>
            <button class="flex flex-col items-center" onclick="auth.logout()"><span class="font-bold text-xl">🚪</span>Logout</button>
        </div>
    </div>

</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/portal.js"></script>
</body>
</html>
